name: File-Based Workflow Dispatcher

on:
  push:
    branches: [main]
    paths:
      - 'folder1/**'
      - 'folder2/**'
      - 'folder3/**'

jobs:
  detect-changes:
    runs-on: windows-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
      has_changes: ${{ steps.build-matrix.outputs.has_changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        uses: tj-actions/changed-files@v45
        with:
          files: |
            folder1/**
            folder2/**
            folder3/**

      - name: Build matrix from changed files
        id: build-matrix
        shell: pwsh
        run: |
          $changedFiles = "${{ steps.changes.outputs.all_changed_files }}"
          
          if ([string]::IsNullOrWhiteSpace($changedFiles)) {
            "has_changes=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            'matrix={"include":[]}' | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            exit 0
          }

          $files = $changedFiles -split '\s+' | Where-Object { $_ -ne '' }
          $include = @()

          foreach ($file in $files) {
            $folder = Split-Path -Path $file -Parent
            $filename = Split-Path -Path $file -Leaf
            # Normalize to forward slashes for consistency
            $folder = $folder -replace '\\', '/'
            $include += @{
              folder = $folder
              file = $filename
              path = $file
            }
          }

          $matrix = @{ include = $include } | ConvertTo-Json -Compress -Depth 5
          # Ensure single-element arrays stay as arrays
          if ($include.Count -eq 1) {
            $matrix = '{"include":[' + (($include[0] | ConvertTo-Json -Compress)) + ']}'
          }

          "matrix=$matrix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "has_changes=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          
          Write-Host "Generated matrix: $matrix"

  call-reusable:
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    uses: ./.github/workflows/reusable-workflow.yml
    with:
      folder_name: ${{ matrix.folder }}
      file_name: ${{ matrix.file }}
      file_path: ${{ matrix.path }}
